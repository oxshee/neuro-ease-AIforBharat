<!DOCTYPE html>
<html>
<head>
  <title>NeuroAssist</title>

  <style>

    body{
      font-family: Arial;
      width:260px;
      padding:10px;
      background:#f4f6f8;
    }

    button{
      width:100%;
      padding:8px;
      margin-top:6px;
      border:none;
      border-radius:6px;
      background:#2b7cff;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{
      background:#1f5ed6;
    }

    .reader-controls{
      margin-top:10px;
      background:white;
      padding:10px;
      border-radius:6px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }

    .play-row{
      display:flex;
      gap:6px;
      margin-bottom:8px;
    }

    .play-row button{
      flex:1;
      background:#444;
    }

    .play-row button:hover{
      background:#222;
    }

    label{
      font-size:12px;
      font-weight:bold;
    }

    input{
      width:100%;
    }

  </style>

</head>

<body>

<h3>NeuroAssist</h3>

<button id="simplify">Simplify Text</button>
<button id="theme">Calm Theme</button>
<button id="hide">Hide Distractions</button>

<div class="reader-controls">

<label>Text Reader</label>

<div class="play-row">
<button id="playBtn">Play</button>
<button id="pauseBtn">Pause</button>
<button id="stopBtn">Stop</button>
</div>

<label>Reading Speed</label>

<input
type="range"
id="speedControl"
min="0.5"
max="2"
step="0.1"
value="1"
>

</div>

<script src="popup.js"></script>

</body>
</html>
